syntax = "proto3";

package chumchat.v1;

import "chumchat/models/v1/types.proto";

option go_package = "github.com/kizuna-org/chumchat-server/gen/chumchat/v1;mainv1";

message CreateAutonymRequest {}

message CreateAutonymResponse {
  chumchat.models.v1.ULID autonym_id = 1;
  string private_key = 2;
}

message GetAutonymAPITokenRequest {
  chumchat.models.v1.ULID autonym_id = 1;
}

message GetAutonymAPITokenResponse {
  string api_token = 1;
}
