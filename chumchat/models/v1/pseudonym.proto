syntax = "proto3";

package chumchat.models.v1;

import "chumchat/models/v1/autonym.proto";
import "chumchat/models/v1/types.proto";

option go_package = "github.com/kizuna-org/chumchat-server/gen/chumchat/models/v1;modelsv1";

message PseudonymData {
  models.v1.ULID autonym_id = 1;
  models.v1.AutonymProfile profile = 2;
}

message PseudonymProfile{
  string name = 1;
  string profile_image_url = 2; 
  models.v1.Gender gender = 3;
  models.v1.AgeGroup age_group = 4;
}
