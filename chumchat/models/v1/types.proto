syntax = "proto3";

package chumchat.models.v1;

option go_package = "github.com/kizuna-org/chumchat-server/gen/chumchat/models/v1;modelsv1";

// ULID https://github.com/ulid/spec
message ULID {
  string value = 1;
}

enum Gender {
  GENDER_UNSPECIFIED = 0;
  GENDER_MALE = 1;
  GENDER_FEMALE = 2;
  GENDER_OTHER = 3;
}

enum AgeGroup {
  AGE_GROUP_UNSPECIFIED = 0;
  AGE_GROUP_HIGHER = 1;
  AGE_GROUP_LOWER = 2;
  AGE_GROUP_ABOUT_SAME = 3;
}
