syntax = "proto3";

package chumchat.models.v1;

import "google/protobuf/timestamp.proto";
import "chumchat/models/v1/types.proto";

option go_package = "github.com/kizuna-org/chumchat-server/gen/chumchat/models/v1;modelsv1";

message AutonymData {
  chumchat.models.v1.ULID autonym_id = 1;
  AutonymProfile profile = 2;
}

message AutonymProfile{
  string name = 1;
  string profile_image_url = 2;
  chumchat.models.v1.Gender gender = 3;
  string live_location = 4;
  repeated LiveLocation live_location_history = 5;
}

message LiveLocation {
  google.protobuf.Timestamp timestamp = 1;
  string location = 2;
}
