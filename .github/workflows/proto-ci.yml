name: Protocol Buffers CI

on:
  pull_request:
    paths:
      - '**.proto'
      - 'buf.yaml'
      - 'buf.gen.yaml'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  buf-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-action@275c46df241e678db8e3ff3969ecb24b0b9001c5 # V1.0.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  buf-gen:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-action@275c46df241e678db8e3ff3969ecb24b0b9001c5 # V1.0.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          setup_only: true
      - name: buf generate
        run: |
          buf generate
